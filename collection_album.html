<style>
.album-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 18px;
}
.album-item {
  position: relative; overflow: hidden;
  border-radius: 14px;
  box-shadow: 0 4px 20px rgba(28,26,46,0.12);
  cursor: none;
  background: var(--parchment);
  aspect-ratio: 1;
}
.album-item img {
  width:100%; height:100%; object-fit:cover;
  display:block;
  transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
}
.album-item:hover img { transform: scale(1.1); }
.album-item::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(to top, rgba(28,26,46,0.4) 0%, transparent 50%);
  opacity:0; transition:opacity 0.3s;
}
.album-item:hover::after { opacity:1; }

/* Lightbox */
.lightbox {
  display:none; position:fixed; inset:0; z-index:200;
  background:rgba(15,13,26,0.95); backdrop-filter:blur(20px);
  align-items:center; justify-content:center;
  cursor:none;
}
.lightbox.active { display:flex; }
.lightbox img {
  max-width:88vw; max-height:88vh;
  object-fit:contain; border-radius:10px;
  box-shadow:0 30px 80px rgba(0,0,0,0.6);
  animation: fadeUp 0.25s both;
}
.lb-close {
  position:absolute; top:20px; right:24px;
  font-size:2rem; color:rgba(255,255,255,0.6);
  cursor:none; background:none; border:none;
  font-family:'DM Sans',sans-serif; line-height:1;
  transition:color 0.2s;
}
.lb-close:hover { color:white; }
.lb-prev, .lb-next {
  position:absolute; top:50%; transform:translateY(-50%);
  background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2);
  color:white; font-size:1.5rem; padding:12px 18px;
  border-radius:50px; cursor:none; border:none;
  transition:background 0.3s;
}
.lb-prev:hover, .lb-next:hover { background:rgba(255,255,255,0.2); }
.lb-prev { left:20px; }
.lb-next { right:20px; }
</style>

  <button class="lb-prev" onclick="shiftLB(-1,event)">‹</button>

  <button class="lb-next" onclick="shiftLB(1,event)">›</button>

<script>
const dot=document.getElementById('cursor-dot'),glow=document.getElementById('cursor-glow');
let mx=0,my=0,gx=0,gy=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;dot.style.left=mx+'px';dot.style.top=my+'px';});
(function loop(){gx+=(mx-gx)*0.12;gy+=(my-gy)*0.12;glow.style.left=gx+'px';glow.style.top=gy+'px';requestAnimationFrame(loop);})();

const imgs=[...document.querySelectorAll('#albumGrid img')];
let cur=0;
function openLB(i){cur=i;document.getElementById('lbImg').src=imgs[i].src;document.getElementById('lightbox').classList.add('active');}
function closeLB(e){if(!e||e.target===document.getElementById('lightbox')||e.target.classList.contains('lb-close')){document.getElementById('lightbox').classList.remove('active');}}
function shiftLB(d,e){if(e)e.stopPropagation();cur=(cur+d+imgs.length)%imgs.length;document.getElementById('lbImg').src=imgs[cur].src;}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')shiftLB(1);if(e.key==='ArrowLeft')shiftLB(-1);if(e.key==='Escape')closeLB();});
</script>
